<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title></title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'DM Sans', sans-serif;
  background-image: url('images/fundo.png');
  background-size: cover;
  background-position: center;
}
body::before {
  content:"";
  position:fixed;
  inset:0;
  background:rgba(255,255,255,0.75);
  z-index:-1;
}

/* SLOT */
.slot-viewport {
  height:240px;
  overflow:hidden;
  position:relative;
  border-radius:16px;
  background:#f0f4f8;
}
.slot-viewport::before,
.slot-viewport::after {
  content:'';
  position:absolute;
  left:0;
  right:0;
  height:80px;
  z-index:2;
}
.slot-viewport::before {
  top:0;
  background:linear-gradient(to bottom, #f0f4f8, transparent);
}
.slot-viewport::after {
  bottom:0;
  background:linear-gradient(to top, #f0f4f8, transparent);
}
.slot-highlight {
  position:absolute;
  top:80px;
  height:80px;
  left:0;
  right:0;
  border-top:3px solid #e4650e;
  border-bottom:3px solid #e4650e;
  background:rgba(228,101,14,0.08);
}
.slot-reel {
  display:flex;
  flex-direction:column;
  transition: transform 3s cubic-bezier(0.15, 0.85, 0.35, 1);
}
.slot-cell {
  height:80px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  font-weight:700;
  color:#174290;
  filter:blur(4px);
  opacity:0.3;
}
.slot-cell.winner {
  filter:blur(0);
  opacity:1;
}

/* RESULTADO */
.result-badge {
  width:80px;
  height:80px;
  border-radius:50%;
  background:#174290;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:28px;
  font-weight:700;
  box-shadow:0 4px 12px rgba(23,66,144,.4);
  animation:pop .4s ease-out;
}
@keyframes pop {
  0% {transform:scale(0); opacity:0;}
  70% {transform:scale(1.15);}
  100% {transform:scale(1);}
}

/* MASCOTE */
.mascote {
  position:fixed;
  bottom:40px;
  right:10px;
  width:260px;
  display:none;
  animation:swing 2s infinite ease-in-out;
}
@keyframes swing {
  0%,100%{transform:rotate(-2deg)}
  50%{transform:rotate(2deg)}
}

/* BALÃO */
.speech {
  position: fixed;
  bottom: 260px;
  right: 40px;
  background: #fff;
  padding: 10px 16px;
  border-radius: 12px;
  font-weight: bold;
  display: none;
  box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
.speech::after {
  content: "";
  position: absolute;
  bottom: -10px;
  left: 50%;
  transform: translateX(-50%);
  border: 10px solid transparent;
  border-top-color: white;
}

/* CONFETE */
#confetti {
  position:fixed;
  inset:0;
  pointer-events:none;
}
</style>
</head>

<body class="min-h-screen flex flex-col">

<header class="px-6 py-4 flex items-center gap-4" style="background:#174290;">
<img src="images/logo.png" class="h-12">
<h1 class="text-white text-2xl font-bold">Sorteador GANEP</h1>
</header>

<main class="flex-1 flex flex-col items-center px-4 py-8">

<div class="w-full max-w-lg bg-white rounded-2xl shadow-lg p-6 mb-8">
<h2 class="text-center font-bold text-xl mb-6 text-[#174290]">Sorteio de Números</h2>

<div class="grid grid-cols-2 gap-4 mb-4">
<input id="min" type="number" value="1" class="border p-2 rounded">
<input id="max" type="number" value="100" class="border p-2 rounded">
</div>

<input id="qty" type="number" value="1" class="border p-2 rounded w-full mb-4">

<button onclick="sortear()" class="w-full py-3 bg-orange-500 text-white rounded-xl font-bold">
SORTEAR
</button>
</div>

<div id="slot-container" class="hidden w-full max-w-xs mb-6">
  <div class="slot-viewport">
    <div class="slot-highlight"></div>
    <div id="slot-reel" class="slot-reel"></div>
  </div>
</div>

<div id="resultado" class="flex gap-4 flex-wrap justify-center"></div>

<button onclick="resetar()" class="mt-6 px-6 py-3 bg-blue-600 text-white rounded-xl font-bold">
Novo sorteio
</button>

</main>

<img src="images/mascote.png" class="mascote" id="mascote">
<div id="speech" class="speech">Parabéns 🎉</div>

<canvas id="confetti"></canvas>

<footer class="text-center py-4 text-white" style="background:#011b5c;">
GANEP Educação — Sorteador Online
</footer>

<script>
const CELL = 80;

/* AUDIO CONFETE */
let confettiSound = new Audio("https://assets.mixkit.co/sfx/preview/mixkit-party-confetti-boost-1686.mp3");
confettiSound.loop = true;
confettiSound.volume = 0.4;

/* CONFETE */
let confettiInterval;
let particles = [];

function startConfetti() {
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  function burst() {
    for (let i = 0; i < 50; i++) {
      particles.push({
        x: 0,
        y: canvas.height,
        vx: Math.random()*8,
        vy: -Math.random()*10,
        life: 100,
        color: `hsl(${Math.random()*360},100%,50%)`
      });
    }
  }

  burst();
  confettiInterval = setInterval(burst, 500);

  let start = Date.now();

  function animate() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    particles.forEach(p=>{
      p.x+=p.vx;
      p.y+=p.vy;
      p.vy+=0.3;
      p.life--;

      ctx.fillStyle=p.color;
      ctx.fillRect(p.x,p.y,6,6);
    });

    particles = particles.filter(p=>p.life>0);

    if(Date.now()-start<60000 || particles.length){
      requestAnimationFrame(animate);
    }
  }

  animate();

  confettiSound.currentTime = 0;
  confettiSound.play();
}

function stopConfetti(){
  clearInterval(confettiInterval);
  particles = [];
  confettiSound.pause();
  confettiSound.currentTime = 0;
}

/* SLOT */
function build(list,win){
 let arr=[];
 for(let i=0;i<6;i++){
  arr.push(...list.sort(()=>Math.random()-0.5));
 }
 arr.push(win);
 arr.push(list[Math.floor(Math.random()*list.length)]);
 return arr;
}

function spin(list,win){
 return new Promise(res=>{
  const reel=document.getElementById("slot-reel");
  const box=document.getElementById("slot-container");

  box.classList.remove("hidden");
  reel.innerHTML="";

  const data=build(list,win);
  const winIndex=data.length-2;

  data.forEach((n,i)=>{
   const d=document.createElement("div");
   d.className="slot-cell";
   if(i===winIndex) d.classList.add("winner");
   d.innerText=n;
   reel.appendChild(d);
  });

  const y=-(winIndex*CELL - CELL);

  requestAnimationFrame(()=>{
    reel.style.transform=`translateY(${y}px)`;
  });

  setTimeout(res,3000);
 });
}

/* SORTEIO */
async function sortear(){
 const min=+document.getElementById("min").value;
 const max=+document.getElementById("max").value;
 const qty=+document.getElementById("qty").value;

 if(!min||!max||!qty) return alert("Preencha corretamente");
 if(min>=max) return alert("Intervalo inválido");
 if(qty>(max-min+1)) return alert("Quantidade inválida");

 let list=[];
 for(let i=min;i<=max;i++) list.push(i);

 let usados=[];
 const resultado=document.getElementById("resultado");
 resultado.innerHTML="";

 for(let i=0;i<qty;i++){
  let n;
  do{ n=list[Math.floor(Math.random()*list.length)] }
  while(usados.includes(n));

  usados.push(n);

  await spin(list,n);

  const b=document.createElement("div");
  b.className="result-badge";
  b.innerText=n;
  resultado.appendChild(b);
 }

 document.getElementById("mascote").style.display="block";
 document.getElementById("speech").style.display="block";

 startConfetti();

 resultado.scrollIntoView({behavior:"smooth", block:"center"});
}

/* RESET */
function resetar(){
 document.getElementById("resultado").innerHTML="";
 document.getElementById("slot-container").classList.add("hidden");
 document.getElementById("mascote").style.display="none";
 document.getElementById("speech").style.display="none";

 stopConfetti();
}
</script>

</body>
</html>
